<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>haecho — ASCII aquarium</title>
<style>
  :root {
    --bg: #e3e7e1;
    --ink: #29322c;
    --muted: #5f6d63;
    --accent: #2f9e5f;
    --bezel: #14181d;
    --bezel-edge: #2c343c;
    --screen: #0b1016;
    --key-bg: #f2f5f1;
    --key-edge: #c3cdc5;
    --key-shadow: #aab6ac;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1312;
      --ink: #d3dcd5;
      --muted: #7d8b81;
      --accent: #4cc275;
      --bezel: #171c22;
      --bezel-edge: #333c46;
      --key-bg: #1a201d;
      --key-edge: #2e3833;
      --key-shadow: #0a0d0b;
    }
  }
  :root[data-theme="light"] {
    --bg: #e3e7e1; --ink: #29322c; --muted: #5f6d63; --accent: #2f9e5f;
    --bezel: #14181d; --bezel-edge: #2c343c;
    --key-bg: #f2f5f1; --key-edge: #c3cdc5; --key-shadow: #aab6ac;
  }
  :root[data-theme="dark"] {
    --bg: #0f1312; --ink: #d3dcd5; --muted: #7d8b81; --accent: #4cc275;
    --bezel: #171c22; --bezel-edge: #333c46;
    --key-bg: #1a201d; --key-edge: #2e3833; --key-shadow: #0a0d0b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 28px 16px;
  }

  .term {
    width: min(920px, 100%);
    background: var(--bezel);
    border: 1px solid var(--bezel-edge);
    border-radius: 12px;
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    overflow: hidden;
  }
  .titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--bezel-edge);
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: #f26d5f; }
  .dot.y { background: #f5bd4f; }
  .dot.g { background: #58c15b; }
  .titlebar span {
    margin-left: 8px;
    color: #8b98a5;
    font-size: 12px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .screenwrap {
    background: var(--screen);
    padding: 14px 12px 16px;
    cursor: crosshair;
  }
  pre#screen {
    margin: 0;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.18;
    color: #b6c2cc;
    user-select: none;
    -webkit-user-select: none;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }
  .controls button {
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    background: var(--key-bg);
    border: 1px solid var(--key-edge);
    border-bottom: 3px solid var(--key-shadow);
    border-radius: 7px;
    padding: 7px 13px 6px;
    cursor: pointer;
  }
  .controls button:hover { border-color: var(--accent); }
  .controls button:active { transform: translateY(1px); border-bottom-width: 2px; }
  .controls button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .controls kbd {
    font-family: inherit;
    color: var(--muted);
    font-size: 11px;
    margin-left: 6px;
  }

  .caption {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    line-height: 1.7;
    max-width: 62ch;
  }
  .caption b { color: var(--accent); font-weight: 600; }
</style>

<div class="term">
  <div class="titlebar" aria-hidden="true">
    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    <span>haecho@tank — ./run --live — 80×24</span>
  </div>
  <div class="screenwrap" id="tank" title="클릭하면 그 자리에 먹이가 떨어집니다">
    <pre id="screen" aria-label="ASCII aquarium animation"></pre>
  </div>
</div>

<div class="controls">
  <button id="bFeed">먹이<kbd>F</kbd></button>
  <button id="bFish">물고기 +<kbd>A</kbd></button>
  <button id="bJelly">해파리 +<kbd>J</kbd></button>
  <button id="bTurtle">거북이 +<kbd>T</kbd></button>
  <button id="bDel">빼기<kbd>X</kbd></button>
  <button id="bPause">일시정지<kbd>Space</kbd></button>
</div>

<p class="caption">
  수조를 <b>클릭</b>하면 그 자리에 먹이가 떨어지고, 물고기들이 쫓아갑니다.<br>
  터미널 버전: <b>cd ~/haecho &amp;&amp; ./run --live</b>
</p>

<script>
'use strict';
// ── same simulation as ~/haecho/haecho.js, rendered into a <pre> ──
const W = 80, H = 24, DT = 1 / 30;
let t = 0;

const rnd = (a, b) => a + Math.random() * (b - a);
const ri = (a, b) => Math.floor(rnd(a, b + 1));
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

// xterm-256 index → hex
const xtCache = {};
function xt(n) {
  if (xtCache[n]) return xtCache[n];
  let r, g, b;
  if (n < 16) {
    return xtCache[n] = ['#000000','#800000','#008000','#808000','#000080','#800080',
      '#008080','#c0c0c0','#808080','#ff0000','#00ff00','#ffff00','#0000ff',
      '#ff00ff','#00ffff','#ffffff'][n];
  } else if (n >= 232) {
    r = g = b = 8 + (n - 232) * 10;
  } else {
    const m = n - 16, L = [0, 95, 135, 175, 215, 255];
    r = L[(m / 36) | 0]; g = L[((m / 6) | 0) % 6]; b = L[m % 6];
  }
  const h = (v) => v.toString(16).padStart(2, '0');
  return xtCache[n] = '#' + h(r) + h(g) + h(b);
}

const GREEN_DIM = [22, 28, 29, 65];
const GREEN_LIT = [35, 41, 77, 84, 120];
const WAVE_BRIGHT = 45, WAVE_MID = 38, WAVE_DIM = 24;
const ROCK_COLS = [240, 242, 244, 246, 60, 66, 103];
const STAR_COLS = [162, 169, 205, 213, 141];
const FISH_COLS = [209, 215, 117, 81, 231, 152, 175];
const PLANKTON_COLS = [237, 238, 240, 24, 31];
const JELLY_COLS = [[213, 169], [183, 139], [141, 103], [159, 73], [225, 182]];

const waterTop = () => 3;
const floorY = () => H - 2;

let fish = [], jellies = [], turtles = [], bubbles = [], foods = [];
let grass = [], kelp = [], rockCells = [], stars = [], plankton = [];
let duck = null;

function makeFish() {
  return {
    x: rnd(2, W - 5), y: rnd(waterTop() + 1, floorY() - 4),
    vx: pick([-1, 1]), sp: rnd(3, 8), ty: 0, retarget: 0, col: pick(FISH_COLS),
  };
}
function makeJelly() {
  const [col, tcol] = pick(JELLY_COLS);
  return {
    x: rnd(3, W - 8), y: rnd(waterTop() + 1, floorY() - 6),
    vx: pick([-1, 1]) * rnd(0.2, 0.7),
    pulseSp: rnd(1.1, 2.0), phase: rnd(0, Math.PI * 2), col, tcol,
  };
}
function makeTurtle() {
  return {
    x: rnd(5, W - 16), y: rnd(waterTop() + 2, floorY() - 5),
    vx: pick([-1, 1]) * rnd(1.5, 3),
    ty: rnd(waterTop() + 2, floorY() - 5), retarget: rnd(4, 10),
    breath: rnd(15, 30), surfacing: false,
    col: pick([65, 71, 108]), shell: pick([94, 101, 137]),
  };
}

function makeScenery() {
  grass = []; kelp = []; rockCells = []; stars = []; plankton = [];
  for (let x = 0; x < W; x++) {
    if (Math.random() < 0.88) {
      grass.push({
        x, h: ri(1, 4), phase: rnd(0, Math.PI * 2),
        sp: rnd(0.7, 1.5), col: pick(Math.random() < 0.35 ? GREEN_LIT : GREEN_DIM),
      });
    }
  }
  const nKelp = Math.floor(W / 7);
  for (let i = 0; i < nKelp; i++) {
    kelp.push({
      x: ri(1, W - 2), h: ri(5, Math.min(9, H - 9)),
      phase: rnd(0, Math.PI * 2), sp: rnd(0.4, 0.9), col: pick(GREEN_LIT),
    });
  }
  const mound = (cx, w, h) => {
    const baseY = floorY() - 1;
    for (let r = 0; r < h; r++) {
      const y = baseY - h + 1 + r;
      const frac = (r + 1) / h;
      const half = Math.max(1, Math.round((w / 2) * Math.sqrt(frac) + rnd(-1, 1)));
      for (let x = cx - half; x <= cx + half; x++) {
        if (x < 0 || x >= W || Math.random() < 0.12) continue;
        let ch = pick(['#', '#', '@', '@', '%', '&', '8']);
        let col = pick(ROCK_COLS);
        if (Math.random() < 0.05) { ch = '*'; col = 84; }
        else if (Math.random() < 0.03) { ch = '%'; col = 205; }
        rockCells.push({ x, y, ch, col });
      }
    }
  };
  mound(Math.round(W * 0.26), Math.round(W * 0.20), ri(3, 5));
  mound(Math.round(W * 0.62), Math.round(W * 0.30), ri(4, 6));

  const nStars = ri(5, 9);
  for (let i = 0; i < nStars; i++) {
    stars.push({
      x: ri(1, W - 3), y: ri(floorY() - 2, floorY()),
      ch: Math.random() < 0.3 ? '**' : '*', col: pick(STAR_COLS),
    });
  }
  const nP = Math.floor((W * H) / 55);
  for (let i = 0; i < nP; i++) {
    plankton.push({
      x: rnd(0, W), y: rnd(waterTop(), floorY() - 3),
      vx: rnd(-0.3, 0.3), phase: rnd(0, Math.PI * 2), sp: rnd(0.3, 1.2),
      ch: pick(['.', '.', '.', ':']), col: pick(PLANKTON_COLS),
    });
  }
  duck = { x: rnd(5, W - 10), vx: pick([-1, 1]) * rnd(0.8, 1.4) };
}

function feed(atX) {
  const cx = atX == null ? rnd(4, W - 5) : clamp(atX, 4, W - 5);
  const n = ri(5, 9);
  for (let i = 0; i < n; i++) {
    foods.push({
      x: clamp(cx + rnd(-3, 3), 1, W - 2), y: rnd(2.5, 3.5),
      vy: rnd(1.2, 2.6), phase: rnd(0, Math.PI * 2),
    });
  }
}

function update() {
  t += DT;

  duck.x += duck.vx * DT;
  if (duck.x < 1) { duck.x = 1; duck.vx = Math.abs(duck.vx); }
  if (duck.x > W - 7) { duck.x = W - 7; duck.vx = -Math.abs(duck.vx); }
  if (Math.random() < 0.003) duck.vx = -duck.vx;

  for (const f of foods) {
    if (f.y < floorY() - 1) {
      f.y += f.vy * DT;
      f.x += Math.sin(t * 2 + f.phase) * 0.6 * DT;
    } else {
      f.y = floorY() - 1;
    }
  }

  for (const p of fish) {
    let target = null, best = Infinity;
    for (const f of foods) {
      const d = Math.abs(f.x - p.x) + Math.abs(f.y - p.y);
      if (d < best) { best = d; target = f; }
    }
    if (target) {
      const dx = target.x - p.x, dy = target.y - p.y;
      if (Math.abs(dx) > 0.6) p.vx = Math.sign(dx);
      p.x += p.vx * p.sp * 1.6 * DT;
      p.y += clamp(dy, -1, 1) * p.sp * 0.6 * DT;
      if (Math.abs(dx) < 1.4 && Math.abs(dy) < 1) {
        foods.splice(foods.indexOf(target), 1);
        bubbles.push({ x: p.x + (p.vx > 0 ? 2 : 0), y: p.y - 0.5, vy: rnd(2, 3.5), phase: rnd(0, 6), age: 0 });
      }
    } else {
      p.retarget -= DT;
      if (p.retarget <= 0) {
        p.retarget = rnd(2, 7);
        p.ty = rnd(waterTop() + 1, floorY() - 4);
        if (Math.random() < 0.35) p.vx = -p.vx;
        p.sp = rnd(3, 8);
      }
      p.x += p.vx * p.sp * DT;
      p.y += clamp(p.ty - p.y, -1, 1) * 0.5 * DT;
    }
    if (p.x < 1) { p.x = 1; p.vx = 1; }
    if (p.x > W - 4) { p.x = W - 4; p.vx = -1; }
    p.y = clamp(p.y, waterTop() + 0.5, floorY() - 1.5);
    if (Math.random() < 0.008) {
      bubbles.push({ x: p.x + (p.vx > 0 ? 2.5 : -0.5), y: p.y, vy: rnd(2, 4), phase: rnd(0, 6), age: 0 });
    }
  }

  for (const tu of turtles) {
    tu.breath -= DT;
    if (tu.breath <= 0 && !tu.surfacing) {
      tu.surfacing = true;
      tu.ty = waterTop() + 1;
    }
    if (!tu.surfacing) {
      tu.retarget -= DT;
      if (tu.retarget <= 0) {
        tu.retarget = rnd(4, 10);
        tu.ty = rnd(waterTop() + 2, floorY() - 5);
        if (Math.random() < 0.25) tu.vx = -tu.vx;
      }
    }
    tu.x += tu.vx * DT;
    tu.y += clamp(tu.ty - tu.y, -1.2, 1.2) * (tu.surfacing ? 1.1 : 0.4) * DT;
    if (tu.x < 1) { tu.x = 1; tu.vx = Math.abs(tu.vx); }
    if (tu.x > W - 12) { tu.x = W - 12; tu.vx = -Math.abs(tu.vx); }
    tu.y = clamp(tu.y, waterTop() + 1, floorY() - 4);
    if (tu.surfacing && tu.y <= waterTop() + 1.3) {
      const hx = tu.vx > 0 ? tu.x + 10 : tu.x;
      for (let i = 0; i < 4; i++) {
        bubbles.push({ x: hx + rnd(-1, 1), y: tu.y - 0.5, vy: rnd(2, 4), phase: rnd(0, 6), age: rnd(1.2, 2.4) });
      }
      tu.surfacing = false;
      tu.breath = rnd(20, 40);
      tu.ty = rnd(waterTop() + 3, floorY() - 5);
    }
  }

  for (const j of jellies) {
    const pulse = Math.sin(t * j.pulseSp + j.phase);
    const vy = pulse > 0 ? -pulse * 2.4 : 0.6;
    j.y += vy * DT;
    j.x += (j.vx + Math.sin(t * 0.5 + j.phase) * 0.4) * DT;
    if (j.x < 1) { j.x = 1; j.vx = Math.abs(j.vx); }
    if (j.x > W - 6) { j.x = W - 6; j.vx = -Math.abs(j.vx); }
    j.y = clamp(j.y, waterTop() + 0.5, floorY() - 4);
    if (Math.random() < 0.02) j.vx = clamp(j.vx + rnd(-0.25, 0.25), -0.8, 0.8);
    if (Math.random() < 0.004) {
      bubbles.push({ x: j.x + 2, y: j.y - 0.5, vy: rnd(1.5, 3), phase: rnd(0, 6), age: 0 });
    }
  }

  if (Math.random() < 0.10) {
    bubbles.push({ x: rnd(1, W - 2), y: floorY() - rnd(0, 3), vy: rnd(1.5, 3.5), phase: rnd(0, 6), age: 0 });
  }
  for (const b of bubbles) {
    b.age += DT;
    b.y -= b.vy * DT;
    b.x += Math.sin(t * 3 + b.phase) * 1.2 * DT;
  }
  bubbles = bubbles.filter((b) => b.y > waterTop() - 1);

  for (const p of plankton) {
    p.x += p.vx * DT;
    if (p.x < 0) p.x = W - 1;
    if (p.x >= W) p.x = 0;
  }
}

// ── rendering ──
let grid;
function put(x, y, ch, col) {
  x = Math.round(x); y = Math.round(y);
  if (x < 0 || x >= W || y < 0 || y >= H) return;
  grid[y][x] = [ch, col];
}
function putStr(x, y, str, col) {
  for (let i = 0; i < str.length; i++) put(x + i, y, str[i], col);
}
const pickBright = (col) => GREEN_LIT.includes(col) ? col : 41;

function render(fps) {
  grid = Array.from({ length: H }, () => Array.from({ length: W }, () => [' ', 0]));

  for (const p of plankton) {
    if (Math.sin(t * p.sp + p.phase) > -0.2) put(p.x, p.y, p.ch, p.col);
  }
  for (const c of rockCells) put(c.x, c.y, c.ch, c.col);

  const drawBlade = (b, amp) => {
    let prev = 0;
    for (let i = 0; i < b.h; i++) {
      const lean = Math.sin(t * b.sp + b.phase + i * 0.4) * amp * ((i + 1) / b.h);
      const off = Math.round(lean);
      let ch = '|';
      if (off > prev) ch = '/';
      else if (off < prev) ch = '\\';
      if (ch === '|' && Math.abs(lean - off) > 0.3) ch = lean > off ? ')' : '(';
      const y = floorY() - i;
      const col = i >= b.h - 2 && b.h > 2 ? pickBright(b.col) : b.col;
      put(b.x + off, y, ch, col);
      prev = off;
    }
  };
  for (const g of grass) drawBlade(g, 1.2);
  for (const k of kelp) drawBlade(k, 2.6);

  for (const s of stars) putStr(s.x, s.y, s.ch, s.col);
  for (const f of foods) put(f.x, f.y, ':', 214);

  for (const b of bubbles) {
    const ch = b.age < 0.8 ? '.' : b.age < 2 ? 'o' : 'O';
    put(b.x, b.y, ch, b.age < 2 ? 31 : 45);
  }

  for (const tu of turtles) {
    const x = Math.round(tu.x), y = Math.round(tu.y);
    const right = tu.vx > 0;
    putStr(x + 2, y, '.==-==.', tu.shell);
    putStr(x + 1, y + 1, '(  # #  )', tu.col);
    put(x + 4, y + 1, '#', tu.shell);
    put(x + 6, y + 1, '#', tu.shell);
    put(right ? x : x + 10, y + 1, '~', tu.col);
    put(right ? x + 10 : x, y + 1, 'o', tu.col);
    const paddle = Math.floor(t * 2.5) % 2 === 0;
    put(x + 3, y + 2, paddle ? '/' : '\\', tu.col);
    put(x + 7, y + 2, paddle ? '\\' : '/', tu.col);
  }

  for (const j of jellies) {
    const pulse = Math.sin(t * j.pulseSp + j.phase);
    const open = pulse > 0;
    const x = Math.round(j.x), y = Math.round(j.y);
    putStr(x + 1, y, '.-.', j.col);
    putStr(x + (open ? 0 : 1), y + 1, open ? '(   )' : '(_)', j.col);
    const tx = open ? [0, 2, 4] : [1, 2, 3];
    for (let k = 0; k < 3; k++) {
      for (let r = 0; r < 2; r++) {
        const s = Math.sin(t * 2.5 + j.phase + k * 1.3 + r * 0.7);
        const ch = s > 0.4 ? '/' : s < -0.4 ? '\\' : '|';
        put(x + tx[k] + Math.round(s * 0.6), y + 2 + r, ch, j.tcol);
      }
    }
  }

  for (const p of fish) {
    putStr(p.x, p.y, p.vx > 0 ? '><>' : '<><', p.col);
  }

  for (let x = 0; x < W; x++) {
    const s = Math.sin(x * 0.31 - t * 1.4) + Math.sin(x * 0.13 + t * 0.8);
    if (s > -0.5) {
      const col = s > 1.1 ? WAVE_BRIGHT : s > 0.2 ? WAVE_MID : WAVE_DIM;
      put(x, 1, '~', col);
    }
    if (s > 0.9) put(x, 2, '~', WAVE_DIM);
  }
  putStr(duck.x, 1, '(..~)', 230);
  putStr(duck.x + 1, 2, '::', 214);

  const prompt = 'haecho@tank:~$ ';
  const cmd = './run --live';
  const stats = `fish:${fish.length}  jelly:${jellies.length}  turtle:${turtles.length}  food:${foods.length}  fps:${fps}`;
  const hint = '[click]feed [f/a/j/t/x] [space]';
  putStr(0, 0, prompt, 252);
  putStr(prompt.length, 0, cmd, 81);
  putStr(prompt.length + cmd.length + 3, 0, stats, 74);
  const hx = W - hint.length - 1;
  if (hx > prompt.length + cmd.length + stats.length + 6) putStr(hx, 0, hint, 240);

  screenEl.innerHTML = toHtml();
}

const esc = (ch) => ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : ch;
function toHtml() {
  let s = '';
  for (let y = 0; y < H; y++) {
    let run = '', runCol = -1;
    const flush = () => {
      if (!run) return;
      s += runCol === -1 ? run : `<span style="color:${xt(runCol)}">${run}</span>`;
      run = '';
    };
    for (let x = 0; x < W; x++) {
      const [ch, col] = grid[y][x];
      if (ch === ' ') {
        if (runCol !== -1) { flush(); runCol = -1; }
        run += ' ';
      } else {
        if (col !== runCol) { flush(); runCol = col; }
        run += esc(ch);
      }
    }
    flush();
    s += '\n';
  }
  return s;
}

// ── page wiring ──
const screenEl = document.getElementById('screen');
const tankEl = document.getElementById('tank');
const pauseBtn = document.getElementById('bPause');

function fit() {
  const avail = tankEl.clientWidth - 24; // screenwrap horizontal padding
  const fs = parseFloat(getComputedStyle(screenEl).fontSize);
  const probe = document.createElement('span');
  probe.textContent = '0'.repeat(W);
  probe.style.cssText = 'position:absolute;visibility:hidden';
  screenEl.appendChild(probe);
  const w = probe.getBoundingClientRect().width;
  probe.remove();
  if (w > 0) screenEl.style.fontSize = clamp(fs * avail / w, 5, 17) + 'px';
}

let paused = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function setPaused(v) {
  paused = v;
  pauseBtn.innerHTML = paused ? '재생<kbd>Space</kbd>' : '일시정지<kbd>Space</kbd>';
}

makeScenery();
for (let i = 0; i < 6; i++) fish.push(makeFish());
for (let i = 0; i < 2; i++) jellies.push(makeJelly());
turtles.push(makeTurtle());

let last = performance.now(), acc = 0;
let frames = 0, fpsShown = 30, lastFpsAt = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min(100, now - last);
  last = now;
  if (paused) return;
  acc += dt;
  let stepped = false;
  while (acc >= 1000 / 30) {
    update();
    acc -= 1000 / 30;
    stepped = true;
  }
  if (stepped) {
    frames++;
    if (now - lastFpsAt >= 1000) {
      fpsShown = frames;
      frames = 0;
      lastFpsAt = now;
    }
    render(fpsShown);
  }
}

fit();
render(fpsShown);
setPaused(paused);
requestAnimationFrame(loop);
window.addEventListener('resize', fit);

tankEl.addEventListener('click', (e) => {
  const rect = screenEl.getBoundingClientRect();
  const col = Math.round((e.clientX - rect.left) / (rect.width / W));
  feed(col);
  if (paused) render(fpsShown);
});

const actions = {
  f: () => feed(),
  a: () => fish.push(makeFish()),
  j: () => jellies.push(makeJelly()),
  t: () => turtles.push(makeTurtle()),
  x: () => {
    if (fish.length > 0) fish.pop();
    else if (jellies.length > 0) jellies.pop();
    else if (turtles.length > 0) turtles.pop();
  },
  ' ': () => setPaused(!paused),
};
document.addEventListener('keydown', (e) => {
  const fn = actions[e.key.toLowerCase()];
  if (fn && !e.metaKey && !e.ctrlKey && !e.altKey) {
    e.preventDefault();
    fn();
    if (paused) render(fpsShown);
  }
});
document.getElementById('bFeed').addEventListener('click', actions.f);
document.getElementById('bFish').addEventListener('click', actions.a);
document.getElementById('bJelly').addEventListener('click', actions.j);
document.getElementById('bTurtle').addEventListener('click', actions.t);
document.getElementById('bDel').addEventListener('click', actions.x);
pauseBtn.addEventListener('click', () => setPaused(!paused));
</script>
